<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portuga | Staff Portfolio Pro</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:linear-gradient(135deg,#0a0a0a,#111827);
  color:white;
  overflow-x:hidden;
}

/* ANIMATED BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 20%, rgba(99,102,241,0.2), transparent 40%),
             radial-gradient(circle at 80% 80%, rgba(168,85,247,0.2), transparent 40%);
  z-index:-1;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky;
  top:0;
}

.logo{
  font-weight:bold;
  color:#a855f7;
  letter-spacing:1px;
}

.menu{
  font-size:24px;
  cursor:pointer;
  transition:0.3s;
}

.menu:hover{
  color:#a855f7;
  transform:scale(1.1);
}

/* PROFILE */
.profile{
  text-align:center;
  padding:50px 20px 20px;
}

.avatar{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid #a855f7;
  box-shadow:0 0 30px rgba(168,85,247,0.4);
  transition:0.3s;
}

.avatar:hover{
  transform:scale(1.08);
}

.name{
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

.role{
  color:#a855f7;
  margin-top:5px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:#a855f7;
  color:white;
  border-radius:12px;
  text-decoration:none;
  transition:0.3s;
  font-weight:bold;
}

.btn:hover{
  background:#fff;
  color:#000;
  transform:translateY(-2px);
}

/* CONTAINER */
.container{
  max-width:950px;
  margin:auto;
  padding:20px;
}

/* SECTION */
.section{
  margin-top:35px;
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.section h2{
  color:#a855f7;
  margin-bottom:10px;
  border-left:4px solid #a855f7;
  padding-left:10px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* SKILLS */
.skill{
  margin:10px 0 5px;
}

.bar{
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:10px;
  background:linear-gradient(90deg,#a855f7,#6366f1);
}

/* SERVER */
.server{
  display:flex;
  align-items:center;
  gap:15px;
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.server:hover{
  transform:translateY(-5px);
  border-color:#a855f7;
}

.server img{
  width:75px;
  height:75px;
  border-radius:12px;
}

/* BADGE */
.badge{
  background:#a855f7;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  display:inline-block;
  margin-top:5px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  color:#666;
  font-size:12px;
  margin-top:40px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">PORTUGA</div>
  <div class="menu">☰</div>
</div>

<div class="profile">
