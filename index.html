<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portuga</title>

<style>

/* BODY */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg, #000000, #0f0f0f, #1a1a1a);
  position:relative;
  color:white;
  animation:fadeIn 1s ease-in;
}

/* AMARELO GLOW NO FUNDO */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top, rgba(250,204,21,0.15), transparent 60%);
  pointer-events:none;
}

/* FADE IN */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#0a0a0a;
  border-bottom:1px solid #222;
}

.logo{
  color:#facc15;
  font-weight:bold;
  font-size:22px;
}

.menu{
  font-size:24px;
  cursor:pointer;
  color:#facc15;
}

/* AVATAR */
.avatar-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:30px;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #facc15;
  box-shadow:0 0 25px rgba(250, 204, 21, 0.4);
  transition:0.3s;
}

.avatar:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(250, 204, 21, 0.7);
}

/* DISCORD */
.discord-tag{
  margin-top:10px;
  font-size:14px;
  color:#facc15;
  background:rgba(0,0,0,0.5);
  padding:6px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
  transition:0.3s;
}

.discord-tag a{
  color:white;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}

.discord-tag:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(250,204,21,0.4);
}

.discord-tag a:hover{
  color:#facc15;
  text-shadow:0 0 10px #facc15;
}

/* INTRO */
.intro{
  padding:20px;
  text-align:center;
  font-size:16px;
  line-height:1.5;
  color:#d4d4d4;
}

/* TITLE */
.section-title{
  padding:0 20px 20px 20px;
  font-size:26px;
  color:#facc15;
  font-weight:bold;
  text-align:center;
}

/* CARD */
.server-card{
  position:relative;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin:20px;
  border:1px solid #222;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  transition:all 0.4s ease;
}

.server-card:hover{
  transform:scale(1.05) translateY(-5px);
  box-shadow:0 0 40px rgba(250,204,21,0.3);
}

/* IMAGE */
.server-img{
  width:100%;
  height:180px;
  object-fit:cover;
  filter:brightness(0.75);
  transition:0.4s;
}

.server-card:hover .server-img{
  transform:scale(1.1);
  filter:brightness(0.9);
}

/* INFO */
.server-info{
  padding:15px;
}

.server-info h2{
  margin:0;
  font-size:22px;
}

/* BOTÃO */
.server-info a{
  display:inline-block;
  margin-top:10px;
  color:#facc15;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.server-info a:hover{
  color:white;
  text-shadow:0 0 10px #facc15;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#facc15;
  color:black;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:bold;
}

.badge:hover{
  background:white;
  box-shadow:0 0 10px #facc15;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Portuga</div>
  <div class="menu">☰</div>
</div>

<!-- AVATAR -->
<div class="avatar-container">
  <img src="https://i.imgur.com/uP6CqxD.jpeg" class="avatar" alt="Avatar Portuga">

  <!-- DISCORD -->
  <div class="discord-tag">

</div>

<div class="intro">

</div>

</body>
</html>
